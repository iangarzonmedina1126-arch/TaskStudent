<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial</title>
</head>
<body>

    <h1>Tareas Completadas</h1>

    <button onclick="window.location.href='tareas.html'">
        Volver a tareas
    </button>

    <hr>

    <div id="listaHistorial"></div>

    <script>
        let completadas = JSON.parse(localStorage.getItem("completadas")) || [];

        function mostrarHistorial() {
            let lista = document.getElementById("listaHistorial");
            lista.innerHTML = "";

            if(completadas.length == 0) {
                lista.innerHTML = "<p>No hay tareas completadas.</p>";
            }

            for(let i = 0; i < completadas.length; i++) {
                lista.innerHTML += `
                    <h3>${completadas[i].titulo}</h3>
                    <p>${completadas[i].descripcion}</p>
                    <p>Fecha: ${completadas[i].fecha}</p>
                    <hr>
                `;
            }
        }

        mostrarHistorial();
    </script>

</body>
</html>
